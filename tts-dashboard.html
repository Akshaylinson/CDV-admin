<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piper Streaming TTS Console</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a; 
            color: #e2e8f0; 
            min-height: 100vh;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-size: 2.5rem; color: #3b82f6; margin-bottom: 10px; }
        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .panel { background: #1e293b; border-radius: 12px; padding: 20px; border: 1px solid #334155; }
        .control-panel { grid-column: 1 / -1; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 500; color: #cbd5e1; }
        textarea, select, button { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #475569; 
            border-radius: 8px; 
            background: #334155; 
            color: #e2e8f0; 
            font-size: 14px;
        }
        textarea { resize: vertical; min-height: 100px; }
        .button-group { display: flex; gap: 10px; }
        .btn { 
            padding: 12px 24px; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: 600; 
            transition: all 0.2s;
        }
        .btn-primary { background: #3b82f6; color: white; }
        .btn-primary:hover { background: #2563eb; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-danger:hover { background: #dc2626; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .status { 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            margin-bottom: 15px; 
        }
        .status-dot { 
            width: 12px; 
            height: 12px; 
            border-radius: 50%; 
            background: #ef4444; 
        }
        .status-dot.connected { background: #10b981; }
        .waveform { 
            height: 100px; 
            background: #0f172a; 
            border-radius: 8px; 
            position: relative; 
            overflow: hidden;
            margin-bottom: 15px;
        }
        .wave-bar { 
            position: absolute; 
            bottom: 0; 
            width: 2px; 
            background: linear-gradient(to top, #3b82f6, #60a5fa); 
            transition: height 0.1s;
        }
        .log { 
            background: #0f172a; 
            border-radius: 8px; 
            padding: 15px; 
            height: 200px; 
            overflow-y: auto; 
            font-family: 'Courier New', monospace; 
            font-size: 12px;
        }
        .log-entry { margin-bottom: 5px; }
        .log-info { color: #60a5fa; }
        .log-success { color: #10b981; }
        .log-error { color: #ef4444; }
        @media (max-width: 768px) {
            .dashboard { grid-template-columns: 1fr; }
            .button-group { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Piper Streaming TTS Console</h1>
            <p>Real-time WebSocket Text-to-Speech Streaming</p>
        </div>

        <div class="dashboard">
            <div class="panel control-panel">
                <h3 style="margin-bottom: 20px; color: #3b82f6;">Controls</h3>
                
                <div class="form-group">
                    <label for="textInput">Text to Speech</label>
                    <textarea id="textInput" placeholder="Enter text to convert to speech...">Hello this is Ryan speaking</textarea>
                </div>

                <div class="form-group">
                    <label for="voiceSelect">Voice</label>
                    <select id="voiceSelect">
                        <option value="ryan">Ryan</option>
                        <option value="lessac">Lessac</option>
                        <option value="amy">Amy</option>
                    </select>
                </div>

                <div class="button-group">
                    <button id="startBtn" class="btn btn-primary">Start Streaming</button>
                    <button id="stopBtn" class="btn btn-danger" disabled>Stop</button>
                </div>
            </div>

            <div class="panel">
                <h3 style="margin-bottom: 15px; color: #3b82f6;">Connection Status</h3>
                <div class="status">
                    <div id="statusDot" class="status-dot"></div>
                    <span id="statusText">Disconnected</span>
                </div>
                
                <h4 style="margin-bottom: 10px; color: #cbd5e1;">Audio Visualization</h4>
                <div id="waveform" class="waveform"></div>
                
                <div style="display: flex; justify-content: space-between; font-size: 12px; color: #94a3b8;">
                    <span>Chunks Received: <span id="chunkCount">0</span></span>
                    <span>Total Size: <span id="totalSize">0 KB</span></span>
                </div>
            </div>

            <div class="panel" style="grid-column: 1 / -1;">
                <h3 style="margin-bottom: 15px; color: #3b82f6;">Streaming Log</h3>
                <div id="log" class="log"></div>
            </div>
        </div>
    </div>

    <script>
        let ws;
        const audioContext = new AudioContext({ sampleRate: 22050 });
        let nextTime = 0;

        class TTSStreamer {
            constructor() {
                this.ws = null;
                this.chunkCount = 0;
                this.totalBytes = 0;
                
                this.initElements();
                this.initWaveform();
            }

            initElements() {
                this.startBtn = document.getElementById('startBtn');
                this.stopBtn = document.getElementById('stopBtn');
                this.textInput = document.getElementById('textInput');
                this.voiceSelect = document.getElementById('voiceSelect');
                this.statusDot = document.getElementById('statusDot');
                this.statusText = document.getElementById('statusText');
                this.logEl = document.getElementById('log');
                this.chunkCountEl = document.getElementById('chunkCount');
                this.totalSizeEl = document.getElementById('totalSize');

                this.startBtn.addEventListener('click', () => this.startStreaming());
                this.stopBtn.addEventListener('click', () => this.stopStreaming());
            }

            log(message, type = 'info') {
                const timestamp = new Date().toLocaleTimeString();
                const entry = document.createElement('div');
                entry.className = `log-entry log-${type}`;
                entry.textContent = `[${timestamp}] ${message}`;
                
                this.logEl.appendChild(entry);
                this.logEl.scrollTop = this.logEl.scrollHeight;
            }

            // Initialize waveform visualization
            initWaveform() {
                this.waveform = document.getElementById('waveform');
                this.waveBars = [];
                
                // Create 50 wave bars for visualization
                for (let i = 0; i < 50; i++) {
                    const bar = document.createElement('div');
                    bar.className = 'wave-bar';
                    bar.style.left = (i * 4) + 'px';
                    bar.style.height = '2px';
                    this.waveform.appendChild(bar);
                    this.waveBars.push(bar);
                }
            }

            // Update waveform visualization with audio data
            updateWaveform(audioData) {
                if (!audioData || audioData.length === 0) return;
                
                // Simple visualization - use audio data to animate bars
                const step = Math.floor(audioData.length / this.waveBars.length);
                this.waveBars.forEach((bar, i) => {
                    const sample = Math.abs(audioData[i * step] || 0);
                    const height = sample * 80 + 5;
                    bar.style.height = Math.min(height, 100) + 'px';
                });
            }

            // WebSocket connection and streaming logic
            startStreaming() {
                const text = this.textInput.value.trim();
                const voice = this.voiceSelect.value;

                if (!text) {
                    this.log('Please enter text to convert', 'error');
                    return;
                }

                this.log('Connecting to WebSocket...', 'info');
                this.updateStatus('connecting', 'Connecting...');

                // Connect to WebSocket TTS endpoint
                this.ws = new WebSocket('ws://31.97.61.19:8000/tts/ws');
                
                // CRITICAL: Set binary type to arraybuffer
                this.ws.binaryType = "arraybuffer";
                
                this.ws.onopen = () => {
                    this.log('WebSocket connected', 'success');
                    this.updateStatus('connected', 'Connected');
                    this.startBtn.disabled = true;
                    this.stopBtn.disabled = false;

                    // Send TTS request
                    const request = { text, voice };
                    this.ws.send(JSON.stringify(request));
                    this.log(`Sent request: ${JSON.stringify(request)}`, 'info');
                    this.resetCounters();
                    
                    // Reset audio timing
                    nextTime = 0;
                };

                this.ws.onmessage = async (event) => {
                    // Handle binary audio chunks
                    this.handleAudioChunk(event.data);
                };

                this.ws.onerror = (error) => {
                    this.log('WebSocket error: ' + error, 'error');
                    this.updateStatus('error', 'Connection Error');
                };

                this.ws.onclose = () => {
                    this.log('WebSocket connection closed', 'info');
                    this.updateStatus('disconnected', 'Disconnected');
                    this.startBtn.disabled = false;
                    this.stopBtn.disabled = true;
                };
            }

            // Process and play audio chunks in real-time
            async handleAudioChunk(buffer) {
                try {
                    this.chunkCount++;
                    this.totalBytes += buffer.byteLength;
                    
                    this.updateCounters();
                    this.log(`Received chunk ${this.chunkCount}: ${buffer.byteLength} bytes`, 'success');

                    // Convert PCM16 to Float32 for Web Audio API
                    const pcm16 = new Int16Array(buffer);
                    const float32 = new Float32Array(pcm16.length);

                    for (let i = 0; i < pcm16.length; i++) {
                        float32[i] = pcm16[i] / 32768;
                    }

                    // Create audio buffer with correct sample rate
                    const audioBuffer = audioContext.createBuffer(
                        1,           // mono channel
                        float32.length,
                        22050        // sample rate
                    );

                    audioBuffer.copyToChannel(float32, 0);

                    // Create and schedule audio source
                    const source = audioContext.createBufferSource();
                    source.buffer = audioBuffer;
                    source.connect(audioContext.destination);

                    // Schedule playback for seamless streaming
                    if (nextTime < audioContext.currentTime) {
                        nextTime = audioContext.currentTime;
                    }

                    source.start(nextTime);
                    nextTime += audioBuffer.duration;
                    
                    // Update waveform visualization
                    this.updateWaveform(float32);
                    
                } catch (error) {
                    this.log('Error processing audio chunk: ' + error.message, 'error');
                }
            }

            stopStreaming() {
                if (this.ws) {
                    this.ws.close();
                    this.log('Streaming stopped by user', 'info');
                }
            }

            updateStatus(status, text) {
                this.statusText.textContent = text;
                this.statusDot.className = 'status-dot' + (status === 'connected' ? ' connected' : '');
            }

            resetCounters() {
                this.chunkCount = 0;
                this.totalBytes = 0;
                this.updateCounters();
            }

            updateCounters() {
                this.chunkCountEl.textContent = this.chunkCount;
                this.totalSizeEl.textContent = (this.totalBytes / 1024).toFixed(1) + ' KB';
            }
        }

        // Initialize the TTS Streamer when page loads
        document.addEventListener('DOMContentLoaded', () => {
            new TTSStreamer();
        });
    </script>
</body>
</html>
